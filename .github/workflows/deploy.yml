name: Deploy to GitHub Pages

on:
  # Deploy on every push to main, and allow manual runs from the Actions tab.
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GitHub Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Installs dependencies, runs `astro build`, and uploads ./dist as the
      # Pages artifact. Reads `site` and `base` from astro.config.mjs.
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
